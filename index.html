<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Калькулятор модели и операторов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 8px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 700px;
            padding: 16px;
            transition: all 0.3s ease;
            margin: 5px 0;
        }

        /* Стили для блока настроек */
        .settings-block {
            background: linear-gradient(135deg, #f6f8fa 0%, #eef2f6 100%);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 2px solid #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .settings-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-title span {
            font-size: 1.4em;
        }

        .settings-input-wrapper {
            display: flex;
            align-items: center;
        }

        .settings-input {
            width: 120px;
            padding: 12px 15px;
            border: 2px solid #667eea;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
            background: white;
            outline: none;
            text-align: center;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
        }

        .settings-input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.25);
        }

        .settings-input::placeholder {
            color: #667eea;
            opacity: 0.4;
            font-weight: 500;
        }

        /* Запрет отрицательных значений для всех полей ввода */
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        /* Визуальное предупреждение при попытке ввести отрицательное */
        .input-field.error, .settings-input.error {
            border-color: #ff6b6b;
            background-color: #fff0f0;
        }

        h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 span {
            font-size: 1.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95em;
            border-left: 3px solid #667eea;
            padding-left: 15px;
        }

        .block {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #eaeef2;
        }

        .block-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .block-title span {
            font-size: 1.2em;
        }

        .model-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .model-input-group {
            flex: 1;
        }

        .model-input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.9em;
            text-align: center;
        }

        .input-field {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s, background-color 0.3s;
            outline: none;
        }

        .input-field:focus {
            border-color: #667eea;
        }

        .input-field::placeholder {
            color: #aaa;
            font-style: normal;
            font-size: 0.9em;
        }

        .sum-indicator {
            background: white;
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sum-indicator-label {
            color: #555;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .sum-indicator-value {
            font-size: 1.3em;
            font-weight: 700;
            color: #667eea;
        }

        .result-box {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-value {
            font-size: 1.6em;
            font-weight: 700;
            color: #667eea;
            word-break: break-word;
            text-align: right;
        }

        .operators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .operator-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #eaeef2;
        }

        .operator-card .input-group {
            margin-bottom: 15px;
        }

        .operator-card .input-field {
            background: #f8f9fa;
        }

        .operator-card .result-box {
            background: #f8f9fa;
            border-color: #d0d9e8;
            padding: 12px;
        }

        .operator-card .result-value {
            font-size: 1.4em;
            color: #667eea;
        }

        .total-sum-box {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 15px 20px;
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-sum-label {
            color: #333;
            font-size: 1.1em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .total-sum-value {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
        }

        .reset-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #ffb4b4;
            color: #d46b6b;
            padding: 20px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 20px;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 180, 180, 0.3);
            text-transform: uppercase;
        }

        .reset-btn:hover {
            background: #fff0f0;
            border-color: #ff9f9f;
            color: #c45b5b;
            box-shadow: 0 6px 16px rgba(255, 150, 150, 0.4);
            transform: translateY(-2px);
        }

        .reset-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(255, 150, 150, 0.3);
        }

        .condition-note {
            font-size: 12px;
            color: #e53e3e;
            margin-top: 5px;
            font-style: normal;
            text-align: right;
        }

        /* Мобильная адаптация */
        @media (max-width: 600px) {
            .settings-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            
            .settings-input {
                width: 100%;
                max-width: 150px;
            }
            
            .model-grid {
                gap: 4px;
            }
            
            .model-input-group label {
                font-size: 0.7em;
            }
            
            .input-field {
                padding: 10px 5px;
                font-size: 16px !important;
                text-align: center;
            }
            
            .operators-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>🧮</span> 
            Калькулятор расчетов
        </h1>
        <div class="subtitle">
            Зацени, сколько вы заработали💸!
        </div>

        <!-- Блок: Актуальный курс -->
        <div class="settings-block">
            <div class="settings-header">
                <div class="settings-title">
                    <span>💵</span> Актуальный курс
                </div>
                <div class="settings-input-wrapper">
                    <input type="number" id="baseValue" class="settings-input" placeholder="0" step="0.1" min="0">
                </div>
            </div>
        </div>

        <!-- Блок 1: Модель -->
        <div class="block">
            <div class="block-title">
                <span>👸🏼</span> Модель
            </div>
            <div class="model-grid" id="modelGrid"></div>
            <div class="sum-indicator">
                <span class="sum-indicator-label"><span>📊</span> Сумма всех смен:</span>
                <span class="sum-indicator-value" id="modelSum">0</span>
            </div>
            <div class="total-sum-box">
                <span class="total-sum-label"><span>💰</span> Итого за все смены:</span>
                <span class="total-sum-value" id="modelResult">0.000</span>
            </div>
        </div>

        <!-- Блок 2: Оператор -->
        <div class="block">
            <div class="block-title">
                <span>🎥</span> Оператор
            </div>
            <div class="operators-grid" id="operatorsContainer"></div>
            <div class="sum-indicator">
                <span class="sum-indicator-label"><span>📊</span> Сумма всех смен:</span>
                <span class="sum-indicator-value" id="operatorsSum">0</span>
            </div>
            <div class="total-sum-box">
                <span class="total-sum-label"><span>💰</span> Итого за все смены:</span>
                <span class="total-sum-value" id="totalOperatorsSum">0.000</span>
            </div>
            <div class="condition-note">
                * если меньше 299.99 → 2000<br>
                * если больше 999.99 → X * КУРС / 4 / 2
            </div>
        </div>

        <button class="reset-btn" id="resetBtn">🔄 Очистить все поля</button>
    </div>

    <script>
        // --- Получаем базовое значение из поля ввода ---
        const baseInput = document.getElementById('baseValue');
        
        // --- Функция для предотвращения отрицательных значений ---
        function preventNegative(inputElement) {
            const value = parseFloat(inputElement.value);
            if (!isNaN(value) && value < 0) {
                inputElement.value = '';
                // Добавляем класс ошибки на короткое время
                inputElement.classList.add('error');
                setTimeout(() => {
                    inputElement.classList.remove('error');
                }, 300);
            }
        }

        // --- Функции для получения текущего базового значения ---
        function getBaseValue() {
            // Если поле пустое, возвращаем 0
            if (baseInput.value === '') return 0;
            
            const val = parseFloat(baseInput.value);
            // Если не число или отрицательное, возвращаем 0
            return isNaN(val) || val < 0 ? 0 : val;
        }

        // --- Формулы с использованием базового значения ---
        const MODEL_FORMULA = (x) => {
            const base = getBaseValue();
            // Если курс 0, результат тоже 0
            if (base === 0) return 0;
            return (x * base) / 4;
        };
        
        const OPERATOR_FORMULA = (x, isEmpty) => {
            if (isEmpty) return 0;
            
            const base = getBaseValue();
            
            // Условие 1: Если значение меньше 299.99, возвращаем 2000
            if (x < 299.99) return 2000;
            
            // Условие 2: Если значение больше 999.99, применяем формулу X*base/4/2
            if (x > 999.99) {
                // Если курс 0, результат 0
                if (base === 0) return 0;
                return (x * base) / 4 / 2;
            }
            
            // Условие 3: Для всех остальных случаев (от 299.99 до 999.99)
            // применяем формулу X*base/4-60%
            if (base === 0) return 0;
            const baseResult = (x * base) / 4;
            return baseResult * 0.4;
        };

        const OPERATOR_COUNT = 5;
        const MODEL_FIELDS_COUNT = 5;

        // --- Элементы DOM ---
        const modelGrid = document.getElementById('modelGrid');
        const modelSum = document.getElementById('modelSum');
        const modelResult = document.getElementById('modelResult');
        const operatorsContainer = document.getElementById('operatorsContainer');
        const operatorsSum = document.getElementById('operatorsSum');
        const totalOperatorsSum = document.getElementById('totalOperatorsSum');
        const resetBtn = document.getElementById('resetBtn');

        // Хранилища
        const modelInputs = [];
        const operatorInputs = [];
        const operatorResults = [];

        let isSyncing = false;

        // --- Форматирование ---
        function formatNumber(value) {
            if (isNaN(value) || value === null || value === '') return '0.000';
            return value.toFixed(3);
        }

        // --- Обновление всего приложения при изменении базового значения ---
        function updateAllCalculations() {
            updateModel();
            updateAllOperators();
        }

        // --- Обновление модели ---
        function updateModel() {
            if (isSyncing) return;
            
            let sum = 0;
            modelInputs.forEach(input => {
                const val = parseFloat(input.value);
                if (!isNaN(val)) sum += val;
            });
            
            modelSum.textContent = sum.toFixed(3);
            modelResult.textContent = formatNumber(MODEL_FORMULA(sum));
        }

        // --- Синхронизация из модели в операторы ---
        function syncModelToOperators() {
            isSyncing = true;
            for (let i = 0; i < MODEL_FIELDS_COUNT; i++) {
                if (operatorInputs[i] && modelInputs[i]) {
                    operatorInputs[i].value = modelInputs[i].value;
                }
            }
            for (let i = 0; i < OPERATOR_COUNT; i++) updateOperator(i, true);
            isSyncing = false;
        }

        // --- Обновление суммы полей операторов ---
        function updateOperatorsSum() {
            let sum = 0;
            operatorInputs.forEach(input => {
                const val = parseFloat(input.value);
                if (!isNaN(val)) sum += val;
            });
            operatorsSum.textContent = sum.toFixed(3);
        }

        // --- Обновление итоговой суммы операторов ---
        function updateTotalSum() {
            let total = 0;
            operatorResults.forEach(resultSpan => {
                const value = parseFloat(resultSpan.textContent);
                if (!isNaN(value)) total += value;
            });
            totalOperatorsSum.textContent = formatNumber(total);
        }

        // --- Обновление одного оператора ---
        function updateOperator(index, skipSync = false) {
            const input = operatorInputs[index];
            const resultSpan = operatorResults[index];
            
            if (input && resultSpan) {
                const isEmpty = input.value === '';
                const x = parseFloat(input.value);
                const validX = isNaN(x) ? 0 : x;
                resultSpan.textContent = formatNumber(OPERATOR_FORMULA(validX, isEmpty));
                updateOperatorsSum();
                updateTotalSum();
            }
        }

        // --- Обновление всех операторов ---
        function updateAllOperators() {
            for (let i = 0; i < OPERATOR_COUNT; i++) updateOperator(i);
            updateOperatorsSum();
            updateTotalSum();
        }

        // --- Создание полей модели ---
        function createModelFields() {
            modelGrid.innerHTML = '';
            modelInputs.length = 0;
            
            for (let i = 1; i <= MODEL_FIELDS_COUNT; i++) {
                const inputGroup = document.createElement('div');
                inputGroup.className = 'model-input-group';
                const inputId = `modelInput${i}`;
                
                inputGroup.innerHTML = `
                    <label for="${inputId}">Смена ${i}</label>
                    <input type="number" id="${inputId}" class="input-field" placeholder="0" step="any" inputmode="numeric" min="0">
                `;
                
                modelGrid.appendChild(inputGroup);
                
                const inputEl = document.getElementById(inputId);
                modelInputs.push(inputEl);
                
                // Добавляем защиту от отрицательных значений
                inputEl.addEventListener('input', function() {
                    preventNegative(this);
                    updateModel();
                    syncModelToOperators();
                });
                
                // Также защищаем от вставки отрицательных значений через контекстное меню
                inputEl.addEventListener('change', function() {
                    preventNegative(this);
                });
            }
        }

        // --- Создание карточек операторов ---
        function createOperators() {
            operatorsContainer.innerHTML = '';
            operatorInputs.length = 0;
            operatorResults.length = 0;
            
            for (let i = 1; i <= OPERATOR_COUNT; i++) {
                const card = document.createElement('div');
                card.className = 'operator-card';
                const inputId = `operator${i}Input`;
                const resultId = `operator${i}Result`;
                
                card.innerHTML = `
                    <div class="input-group">
                        <label for="${inputId}">Смена №${i}</label>
                        <input type="number" id="${inputId}" class="input-field" placeholder="0" step="any" inputmode="numeric" min="0">
                    </div>
                    <div class="result-box">
                        <span class="result-label">Результат ${i}:</span>
                        <span class="result-value" id="${resultId}">0.000</span>
                    </div>
                `;
                
                operatorsContainer.appendChild(card);
                
                const inputEl = document.getElementById(inputId);
                const resultEl = document.getElementById(resultId);
                
                operatorInputs.push(inputEl);
                operatorResults.push(resultEl);
                
                // Добавляем защиту от отрицательных значений
                inputEl.addEventListener('input', (function(idx, el) {
                    return function() { 
                        preventNegative(el);
                        if (!isSyncing) updateOperator(idx); 
                    };
                })(i - 1, inputEl));
                
                inputEl.addEventListener('change', function() {
                    preventNegative(this);
                });
            }
            
            updateOperatorsSum();
            updateTotalSum();
        }

        // --- Добавляем защиту для поля курса ---
        baseInput.addEventListener('input', function() {
            preventNegative(this);
            updateAllCalculations();
        });
        
        baseInput.addEventListener('change', function() {
            preventNegative(this);
        });

        // --- Сброс всех полей (кроме курса) ---
        function resetAllToDefault() {
            isSyncing = true;
            modelInputs.forEach(input => input.value = '');
            operatorInputs.forEach(input => input.value = '');
            isSyncing = false;
            updateModel();
            updateAllOperators();
        }

        // --- Инициализация ---
        function initApp() {
            createModelFields();
            createOperators();
            
            resetBtn.addEventListener('click', resetAllToDefault);
            
            updateModel();
            updateAllOperators();
            
            console.log('Приложение готово. Отрицательные значения запрещены во всех полях');
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
